<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redefinir Senha</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      body {
        background-color: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .card {
        background: #ffffff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 420px;
        transition: all 0.3s ease;
      }
      h2 {
        color: #111827;
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
        text-align: center;
      }
      p.subtitle {
        color: #6b7280;
        font-size: 14px;
        text-align: center;
        margin-bottom: 32px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        color: #374151;
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.2s;
        outline: none;
      }
      input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
      }
      input:disabled {
        background-color: #f3f4f6;
        color: #9ca3af;
        cursor: not-allowed;
      }
      button {
        width: 100%;
        background-color: #4f46e5;
        color: #ffffff;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 10px;
      }
      button:hover {
        background-color: #4338ca;
      }
      button:disabled {
        background-color: #a5b4fc;
        cursor: not-allowed;
      }
      .message {
        margin-top: 20px;
        padding: 12px;
        border-radius: 8px;
        font-size: 14px;
        text-align: center;
        display: none;
      }
      .success {
        background-color: #ecfdf5;
        color: #065f46;
        border: 1px solid #a7f3d0;
      }
      .error {
        background-color: #fef2f2;
        color: #991b1b;
        border: 1px solid #fca5a5;
      }

      /* Estilos para a tela de agradecimento */
      .success-icon {
        display: block;
        font-size: 48px;
        text-align: center;
        margin-bottom: 16px;
        color: #10b981;
      }
      .btn-app {
        display: inline-block;
        text-align: center;
        text-decoration: none;
        background-color: #10b981;
        margin-top: 24px;
      }
      .btn-app:hover {
        background-color: #059669;
      }
    </style>
  </head>
  <body>
    <!-- Identificador adicionado ao container para permitir a troca de conteúdo -->
    <div class="card" id="cardContainer">
      <h2>Nova Senha</h2>
      <p class="subtitle">Digite e confirme sua nova senha de acesso.</p>

      <form id="resetForm">
        <div class="form-group">
          <label for="password">Nova Senha</label>
          <input
            type="password"
            id="password"
            required
            placeholder="••••••••"
            minlength="6"
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirmar Nova Senha</label>
          <input
            type="password"
            id="confirmPassword"
            required
            placeholder="••••••••"
            minlength="6"
          />
        </div>

        <button type="submit" id="btnSubmit">Alterar Senha</button>
      </form>

      <div id="msgBox" class="message"></div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");

      const cardContainer = document.getElementById("cardContainer");
      const form = document.getElementById("resetForm");
      const msgBox = document.getElementById("msgBox");
      const btnSubmit = document.getElementById("btnSubmit");
      const passwordInput = document.getElementById("password");
      const confirmPasswordInput = document.getElementById("confirmPassword");

      if (!token) {
        showResponse("Link de recuperação inválido (Token ausente).", true);
        btnSubmit.disabled = true;
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (password !== confirmPassword) {
          showResponse("As senhas não coincidem.", true);
          return;
        }

        // Bloqueia interações durante o salvamento
        btnSubmit.disabled = true;
        btnSubmit.innerText = "Salvando...";
        passwordInput.disabled = true;
        confirmPasswordInput.disabled = true;
        msgBox.style.display = "none";

        try {
          const response = await fetch("http://localhost:3000/auth/reset", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password, token }),
          });

          if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.message || "Erro ao redefinir a senha.");
          }

          // Aguarda um instante para simular o processo e limpa o HTML do card
          setTimeout(() => {
            cardContainer.innerHTML = `
              <span class="success-icon">✓</span>
              <h2>Tudo pronto!</h2>
              <p class="subtitle" style="margin-bottom: 20px;">Sua senha foi redefinida com sucesso. Obrigado por validar sua conta!</p>
              <div class="message success" style="display: block;">A alteração foi salva no banco de dados.</div>
              <a href="https://leogomesdev.com" class="btn-app" style="width: 100%; padding: 12px; border-radius: 8px; color: white; font-weight: 600; text-align: center; display: block; box-sizing: border-box;">Voltar para o Aplicativo</a>
            `;
          }, 800);
        } catch (error) {
          showResponse(error.message, true);
          btnSubmit.disabled = false;
          btnSubmit.innerText = "Alterar Senha";
          passwordInput.disabled = false;
          confirmPasswordInput.disabled = false;
        }
      });

      function showResponse(text, isError) {
        msgBox.innerText = text;
        msgBox.className = `message ${isError ? "error" : "success"}`;
        msgBox.style.display = "block";
      }
    </script>
  </body>
</html>
